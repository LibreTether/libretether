name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

jobs:
  # Create the GitHub release up front (notes only, no assets) so every other job
  # attaches to it. This lets the foundational artifacts — the agent/relay CLIs,
  # install scripts, and the relay Docker image — land in the release first, and the
  # heavy Tauri desktop build (the `desktop` job below) run LAST: if it fails,
  # everything else is already published.
  create-release:
    name: Create release
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      # No checkout needed: `gh` talks to the API and the tag already exists (this
      # runs on a tag push). Create notes-only here; assets are attached by the
      # later jobs. The guard keeps a re-run from failing on an existing release.
      - name: Create the release if it doesn't exist
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes

  # Build the headless libretether-agent and the libretether-relay relay for every
  # supported platform and attach them to the release. The agent's Wayland/PipeWire
  # support is a Linux-target dependency, so the same `cargo build` is correct on
  # every platform; the relay has no system deps.
  binaries:
    name: Binaries (${{ matrix.key }})
    needs: create-release
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: linux-x86_64
            runner: ubuntu-24.04
            ext: ""
          - key: linux-aarch64
            runner: ubuntu-24.04-arm
            ext: ""
          - key: macos-universal
            runner: macos-latest
            ext: ""
            universal: true
          - key: windows-x86_64
            runner: windows-latest
            ext: ".exe"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Linux build dependencies
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config clang libxdo-dev libxcb1-dev libxrandr-dev libxfixes-dev libdbus-1-dev libpipewire-0.3-dev libxkbcommon-dev

      - uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
        # Don't let the action export RUSTFLAGS (it defaults to "-D warnings"):
        # an env RUSTFLAGS overrides .cargo/config.toml, so the Windows build
        # would drop +crt-static and again depend on VCRUNTIME140.dll. Lint
        # denial is enforced by the separate CI check gate, not the release build.
        with:
          rustflags: ""

      - name: Build agent + relay
        if: ${{ !matrix.universal }}
        shell: bash
        run: |
          cargo build -p libretether-agent -p libretether-relay --release
          cp "target/release/libretether-agent${{ matrix.ext }}" "libretether-agent-${{ matrix.key }}${{ matrix.ext }}"
          cp "target/release/libretether-relay${{ matrix.ext }}" "libretether-relay-${{ matrix.key }}${{ matrix.ext }}"

      - name: Build agent + relay (universal macOS)
        if: ${{ matrix.universal }}
        shell: bash
        run: |
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          cargo build -p libretether-agent -p libretether-relay --release --target x86_64-apple-darwin
          cargo build -p libretether-agent -p libretether-relay --release --target aarch64-apple-darwin
          for bin in libretether-agent libretether-relay; do
            lipo -create -output "$bin-${{ matrix.key }}" \
              "target/x86_64-apple-darwin/release/$bin" \
              "target/aarch64-apple-darwin/release/$bin"
          done

      # SHA-256 sidecars so the installers can verify the download over the same
      # TLS-protected release. Each file holds just the hex digest.
      - name: Generate checksums
        shell: bash
        run: |
          for f in "libretether-agent-${{ matrix.key }}${{ matrix.ext }}" "libretether-relay-${{ matrix.key }}${{ matrix.ext }}"; do
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$f" | awk '{print $1}' > "$f.sha256"
            else
              shasum -a 256 "$f" | awk '{print $1}' > "$f.sha256"
            fi
          done

      # Cryptographic build provenance (verifiable with `gh attestation verify`).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            libretether-agent-${{ matrix.key }}${{ matrix.ext }}
            libretether-relay-${{ matrix.key }}${{ matrix.ext }}

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          assets=(
            "libretether-agent-${{ matrix.key }}${{ matrix.ext }}"
            "libretether-agent-${{ matrix.key }}${{ matrix.ext }}.sha256"
            "libretether-relay-${{ matrix.key }}${{ matrix.ext }}"
            "libretether-relay-${{ matrix.key }}${{ matrix.ext }}.sha256"
          )
          # GitHub's asset API can fail partway through a multi-file batch (e.g. the
          # binary lands but its .sha256 doesn't), leaving a release with a missing
          # checksum. Retry the whole upload — `--clobber` makes it idempotent, so a
          # retry re-uploads everything and fills in whatever the last attempt missed.
          for attempt in 1 2 3; do
            if gh release upload "$TAG" "${assets[@]}" --clobber; then
              exit 0
            fi
            echo "::warning::release upload attempt $attempt failed; retrying in 5s"
            sleep 5
          done
          echo "::error::release upload failed after 3 attempts"
          exit 1

  # Publish the one-line agent installers. They're pinned to this exact release
  # (and repo, so forks stay self-contained) so a downloaded script always pulls
  # the matching agent build. Runs after `binaries` so the agent assets exist.
  install-scripts:
    name: Install scripts
    needs: [create-release, binaries]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Pin and upload installers
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          src="https://github.com/LibreTether/libretether/releases/latest/download"
          dst="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          mkdir -p dist-scripts
          for f in scripts/install/install-linux.sh scripts/install/install-macos.sh scripts/install/install-windows.ps1; do
            sed "s#${src}#${dst}#g" "$f" > "dist-scripts/$(basename "$f")"
          done
          gh release upload "$TAG" dist-scripts/* --clobber

  # Build the libretether-relay relay container per-arch on a NATIVE runner (no QEMU
  # emulation — the arm64 leg uses an ARM runner, like the binaries job), push
  # each by digest, then `docker-merge` stitches them into one multi-arch image
  # at ghcr.io/<owner>/libretether-relay. Independent of the GitHub release above.
  docker:
    name: Docker image (${{ matrix.platform }})
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Resolve image name (registry needs lowercase)
        run: echo "REGISTRY_IMAGE=ghcr.io/${OWNER,,}/libretether-relay" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - uses: docker/setup-buildx-action@v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Image metadata (labels)
        id: meta
        uses: docker/metadata-action@v5.8.0
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          touch "${{ runner.temp }}/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload digest
        uses: actions/upload-artifact@v4.6.2
        with:
          name: digests-${{ strategy.job-index }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-arch digests into a single multi-arch manifest and tag it.
  docker-merge:
    name: Docker image (manifest)
    needs: docker
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve image name (registry needs lowercase)
        run: echo "REGISTRY_IMAGE=ghcr.io/${OWNER,,}/libretether-relay" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Download digests
        uses: actions/download-artifact@v4.3.0
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Image metadata (tags)
        id: meta
        uses: docker/metadata-action@v5.8.0
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag || github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag || github.ref_name }}
            type=raw,value=latest

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${REGISTRY_IMAGE}@sha256:%s " *)

      - name: Inspect
        run: docker buildx imagetools inspect "${REGISTRY_IMAGE}:${{ steps.meta.outputs.version }}"

  # Build the Tauri desktop bundles LAST and attach them to the release created at
  # the top. The shared publisher (configured in .publisher.json) creates the
  # release only if it's missing, so here it just uploads the bundles to the
  # existing one. Gated behind the CLI + install-script jobs so a desktop-build
  # failure can't strand them. (The Docker job is independent of the release and
  # runs in parallel — it doesn't gate this.)
  desktop:
    name: Desktop bundles
    needs: [create-release, binaries, install-scripts]
    uses: Skiley/rust-binary-publish/.github/workflows/release.yml@v3.2.0
    permissions:
      contents: write
    with:
      tag: ${{ inputs.tag || github.ref_name }}
