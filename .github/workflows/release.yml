name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

jobs:
  # The Tauri controller bundles + GitHub release are produced by the shared
  # publisher (configured in .publisher.json). This also creates the release the
  # agent job below uploads its binaries to.
  release:
    uses: Skiley/rust-binary-publish/.github/workflows/release.yml@v3.0.0
    permissions:
      contents: write
    with:
      tag: ${{ inputs.tag || github.ref_name }}

  # Build the headless tether-agent and the tether-server relay for every
  # supported platform and attach them to the same release. The agent's
  # Wayland/PipeWire support is a Linux-target dependency, so the same
  # `cargo build` is correct on every platform; the relay has no system deps.
  binaries:
    name: Binaries (${{ matrix.key }})
    needs: release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: linux-x86_64
            runner: ubuntu-24.04
            ext: ""
          - key: linux-aarch64
            runner: ubuntu-24.04-arm
            ext: ""
          - key: macos-universal
            runner: macos-latest
            ext: ""
            universal: true
          - key: windows-x86_64
            runner: windows-latest
            ext: ".exe"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Linux build dependencies
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config clang libxdo-dev libxcb1-dev libxrandr-dev libxfixes-dev libdbus-1-dev libpipewire-0.3-dev libxkbcommon-dev

      - uses: actions-rust-lang/setup-rust-toolchain@v1.16.1

      - name: Build agent + relay
        if: ${{ !matrix.universal }}
        shell: bash
        run: |
          cargo build --manifest-path src-tauri/Cargo.toml -p tether-agent -p tether-server --release
          cp "src-tauri/target/release/tether-agent${{ matrix.ext }}" "tether-agent-${{ matrix.key }}${{ matrix.ext }}"
          cp "src-tauri/target/release/tether-server${{ matrix.ext }}" "tether-server-${{ matrix.key }}${{ matrix.ext }}"

      - name: Build agent + relay (universal macOS)
        if: ${{ matrix.universal }}
        shell: bash
        run: |
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          cargo build --manifest-path src-tauri/Cargo.toml -p tether-agent -p tether-server --release --target x86_64-apple-darwin
          cargo build --manifest-path src-tauri/Cargo.toml -p tether-agent -p tether-server --release --target aarch64-apple-darwin
          for bin in tether-agent tether-server; do
            lipo -create -output "$bin-${{ matrix.key }}" \
              "src-tauri/target/x86_64-apple-darwin/release/$bin" \
              "src-tauri/target/aarch64-apple-darwin/release/$bin"
          done

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ inputs.tag || github.ref_name }}" \
            "tether-agent-${{ matrix.key }}${{ matrix.ext }}" \
            "tether-server-${{ matrix.key }}${{ matrix.ext }}" --clobber
