name: Release

# The whole release runs in the master BRANCH cache scope, not on the tag. Every
# heavy build here caches its work — the agent/relay Rust builds and the desktop
# Tauri bundle via rust-cache, the relay image via buildx's `type=gha` layer cache
# — and GitHub only lets a run *restore* caches created on its own ref or the
# default branch. A tag-triggered run (refs/tags/vX) can therefore never reuse the
# cache a previous tag run saved, so each release would rebuild everything cold.
#
# The `release` Runfile task pushes the `chore: release vX` commit to master right
# before the tag, so we trigger on that commit: every job saves AND restores under
# refs/heads/master, which the next release's master-push run can read — so each
# release warms the next. The tag itself is pushed first (see the Runfile) purely
# so it exists when the jobs below check it out / attach assets to it.

on:
  push:
    branches: [master]
    # The version bump rewrites tauri.conf.json on every release commit; the
    # `prepare` job's guard further restricts this to actual `chore: release`
    # commits, so an unrelated edit to that file spins up (and skips) `prepare`
    # without running a release.
    paths:
      - "libretether-desktop/src-tauri/tauri.conf.json"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

jobs:
  # Resolve the release tag from the committed manifest (the source of truth the
  # `release` task bumps) and gate the whole workflow to release commits. Every
  # other job `needs` this — when the guard is false `prepare` is skipped and the
  # rest skip with it, so a non-release push to master builds nothing.
  prepare:
    name: Resolve release tag
    if: "${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'chore: release ') }}"
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Resolve tag
        id: tag
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ -n "${DISPATCH_TAG:-}" ]; then
            tag="$DISPATCH_TAG"
          else
            tag="v$(jq -r '.version' libretether-desktop/package.json)"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

  # Create the GitHub release up front (notes only, no assets) so every other job
  # attaches to it. The guard keeps a re-run from failing on an existing release.
  create-release:
    name: Create release
    needs: prepare
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      # No checkout needed: `gh` talks to the API and the tag already exists (the
      # `release` task pushes it before the branch that triggered this run). Create
      # notes-only here; assets are attached by the later jobs.
      - name: Create the release if it doesn't exist
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes

  # Build the headless libretether-agent and the libretether-relay relay for every
  # supported platform and attach them to the release. The agent's Wayland/PipeWire
  # support is a Linux-target dependency, so the same `cargo build` is correct on
  # every platform; the relay has no system deps. rust-cache (via the toolchain
  # action) carries the dependency build across releases in the master scope.
  binaries:
    name: Binaries (${{ matrix.key }})
    needs: [prepare, create-release]
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: linux-x86_64
            runner: ubuntu-24.04
            ext: ""
          - key: linux-aarch64
            runner: ubuntu-24.04-arm
            ext: ""
          - key: macos-universal
            runner: macos-latest
            ext: ""
            universal: true
          - key: windows-x86_64
            runner: windows-latest
            ext: ".exe"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Linux build dependencies
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config clang libxdo-dev libxcb1-dev libxrandr-dev libxfixes-dev libdbus-1-dev libpipewire-0.3-dev libxkbcommon-dev nasm

      # OpenH264 (the agent's H.264 encoder) builds its x86 SIMD kernels with nasm.
      # Only x86_64 targets use it — the aarch64 Linux build has no x86 asm, and the
      # macOS universal build needs it only for its x86_64 slice.
      - name: Install nasm (macOS)
        if: startsWith(matrix.runner, 'macos')
        run: brew install nasm

      - name: Install nasm (Windows)
        if: startsWith(matrix.runner, 'windows')
        shell: bash
        run: |
          choco install nasm -y
          echo "C:\\Program Files\\NASM" >> "$GITHUB_PATH"

      - uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
        # Don't let the action export RUSTFLAGS (it defaults to "-D warnings"):
        # an env RUSTFLAGS overrides .cargo/config.toml, so the Windows build
        # would drop +crt-static and again depend on VCRUNTIME140.dll. Lint
        # denial is enforced by the separate CI check gate, not the release build.
        with:
          rustflags: ""

      - name: Build agent + relay
        if: ${{ !matrix.universal }}
        shell: bash
        run: |
          cargo build -p libretether-agent -p libretether-relay --release
          cp "target/release/libretether-agent${{ matrix.ext }}" "libretether-agent-${{ matrix.key }}${{ matrix.ext }}"
          cp "target/release/libretether-relay${{ matrix.ext }}" "libretether-relay-${{ matrix.key }}${{ matrix.ext }}"

      - name: Build agent + relay (universal macOS)
        if: ${{ matrix.universal }}
        shell: bash
        run: |
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          cargo build -p libretether-agent -p libretether-relay --release --target x86_64-apple-darwin
          cargo build -p libretether-agent -p libretether-relay --release --target aarch64-apple-darwin
          for bin in libretether-agent libretether-relay; do
            lipo -create -output "$bin-${{ matrix.key }}" \
              "target/x86_64-apple-darwin/release/$bin" \
              "target/aarch64-apple-darwin/release/$bin"
          done

      # SHA-256 sidecars so the installers can verify the download over the same
      # TLS-protected release. Each file holds just the hex digest.
      - name: Generate checksums
        shell: bash
        run: |
          for f in "libretether-agent-${{ matrix.key }}${{ matrix.ext }}" "libretether-relay-${{ matrix.key }}${{ matrix.ext }}"; do
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$f" | awk '{print $1}' > "$f.sha256"
            else
              shasum -a 256 "$f" | awk '{print $1}' > "$f.sha256"
            fi
          done

      # Cryptographic build provenance (verifiable with `gh attestation verify`).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            libretether-agent-${{ matrix.key }}${{ matrix.ext }}
            libretether-relay-${{ matrix.key }}${{ matrix.ext }}

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          assets=(
            "libretether-agent-${{ matrix.key }}${{ matrix.ext }}"
            "libretether-agent-${{ matrix.key }}${{ matrix.ext }}.sha256"
            "libretether-relay-${{ matrix.key }}${{ matrix.ext }}"
            "libretether-relay-${{ matrix.key }}${{ matrix.ext }}.sha256"
          )
          # GitHub's asset API can fail partway through a multi-file batch (e.g. the
          # binary lands but its .sha256 doesn't), leaving a release with a missing
          # checksum. Retry the whole upload — `--clobber` makes it idempotent, so a
          # retry re-uploads everything and fills in whatever the last attempt missed.
          for attempt in 1 2 3; do
            if gh release upload "$TAG" "${assets[@]}" --clobber; then
              exit 0
            fi
            echo "::warning::release upload attempt $attempt failed; retrying in 5s"
            sleep 5
          done
          echo "::error::release upload failed after 3 attempts"
          exit 1

  # Publish the one-line agent installers. They're pinned to this exact release
  # (and repo, so forks stay self-contained) so a downloaded script always pulls
  # the matching agent build. Runs after `binaries` so the agent assets exist.
  install-scripts:
    name: Install scripts
    needs: [prepare, create-release, binaries]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Pin and upload installers
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          src="https://github.com/LibreTether/libretether/releases/latest/download"
          dst="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          mkdir -p dist-scripts
          for f in scripts/install/install-linux.sh scripts/install/install-macos.sh scripts/install/install-windows.ps1; do
            sed "s#${src}#${dst}#g" "$f" > "dist-scripts/$(basename "$f")"
          done
          gh release upload "$TAG" dist-scripts/* --clobber

  # Build the libretether-relay relay container per-arch on a NATIVE runner (no QEMU
  # emulation — the arm64 leg uses an ARM runner, like the binaries job), push
  # each by digest, then `docker-merge` stitches them into one multi-arch image
  # at ghcr.io/<owner>/libretether-relay. The buildx `type=gha` layer cache lands
  # in the master scope, so it carries across releases like the Rust builds.
  docker:
    name: Docker image (${{ matrix.platform }})
    needs: prepare
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Resolve image name (registry needs lowercase)
        run: echo "REGISTRY_IMAGE=ghcr.io/${OWNER,,}/libretether-relay" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - uses: docker/setup-buildx-action@v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Image metadata (labels)
        id: meta
        uses: docker/metadata-action@v5.8.0
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          touch "${{ runner.temp }}/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload digest
        uses: actions/upload-artifact@v4.6.2
        with:
          name: digests-${{ strategy.job-index }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-arch digests into a single multi-arch manifest and tag it.
  docker-merge:
    name: Docker image (manifest)
    needs: [prepare, docker]
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve image name (registry needs lowercase)
        run: echo "REGISTRY_IMAGE=ghcr.io/${OWNER,,}/libretether-relay" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Download digests
        uses: actions/download-artifact@v4.3.0
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Image metadata (tags)
        id: meta
        uses: docker/metadata-action@v5.8.0
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.tag }}
            type=raw,value=latest

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${REGISTRY_IMAGE}@sha256:%s " *)

      - name: Inspect
        run: docker buildx imagetools inspect "${REGISTRY_IMAGE}:${{ steps.meta.outputs.version }}"

  # Build the Tauri desktop bundles via the shared publisher and attach them to the
  # release. Runs in parallel with the jobs above — they're independent jobs, so a
  # desktop-build failure can't strand the already-uploaded binaries/installers,
  # and the publisher creates-or-reuses the release and uploads with --clobber. The
  # reusable workflow inherits this run's master ref, so its rust-cache is warm too.
  desktop:
    name: Desktop bundles
    needs: prepare
    uses: Skiley/rust-binary-publish/.github/workflows/release.yml@v3.2.0
    permissions:
      contents: write
    with:
      tag: ${{ needs.prepare.outputs.tag }}
