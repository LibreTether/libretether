name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

jobs:
  # The Tauri controller bundles + GitHub release are produced by the shared
  # publisher (configured in .publisher.json). This also creates the release the
  # agent job below uploads its binaries to.
  release:
    uses: Skiley/rust-binary-publish/.github/workflows/release.yml@v3.0.0
    permissions:
      contents: write
    with:
      tag: ${{ inputs.tag || github.ref_name }}

  # Build the headless libretether-agent and the libretether-relay relay for every
  # supported platform and attach them to the same release. The agent's
  # Wayland/PipeWire support is a Linux-target dependency, so the same
  # `cargo build` is correct on every platform; the relay has no system deps.
  binaries:
    name: Binaries (${{ matrix.key }})
    needs: release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: linux-x86_64
            runner: ubuntu-24.04
            ext: ""
          - key: linux-aarch64
            runner: ubuntu-24.04-arm
            ext: ""
          - key: macos-universal
            runner: macos-latest
            ext: ""
            universal: true
          - key: windows-x86_64
            runner: windows-latest
            ext: ".exe"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Linux build dependencies
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config clang libxdo-dev libxcb1-dev libxrandr-dev libxfixes-dev libdbus-1-dev libpipewire-0.3-dev libxkbcommon-dev

      - uses: actions-rust-lang/setup-rust-toolchain@v1.16.1

      - name: Build agent + relay
        if: ${{ !matrix.universal }}
        shell: bash
        run: |
          cargo build -p libretether-agent -p libretether-relay --release
          cp "target/release/libretether-agent${{ matrix.ext }}" "libretether-agent-${{ matrix.key }}${{ matrix.ext }}"
          cp "target/release/libretether-relay${{ matrix.ext }}" "libretether-relay-${{ matrix.key }}${{ matrix.ext }}"

      - name: Build agent + relay (universal macOS)
        if: ${{ matrix.universal }}
        shell: bash
        run: |
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          cargo build -p libretether-agent -p libretether-relay --release --target x86_64-apple-darwin
          cargo build -p libretether-agent -p libretether-relay --release --target aarch64-apple-darwin
          for bin in libretether-agent libretether-relay; do
            lipo -create -output "$bin-${{ matrix.key }}" \
              "target/x86_64-apple-darwin/release/$bin" \
              "target/aarch64-apple-darwin/release/$bin"
          done

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ inputs.tag || github.ref_name }}" \
            "libretether-agent-${{ matrix.key }}${{ matrix.ext }}" \
            "libretether-relay-${{ matrix.key }}${{ matrix.ext }}" --clobber

  # Build the libretether-relay relay container per-arch on a NATIVE runner (no QEMU
  # emulation — the arm64 leg uses an ARM runner, like the binaries job), push
  # each by digest, then `docker-merge` stitches them into one multi-arch image
  # at ghcr.io/<owner>/libretether-relay. Independent of the GitHub release above.
  docker:
    name: Docker image (${{ matrix.platform }})
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Resolve image name (registry needs lowercase)
        run: echo "REGISTRY_IMAGE=ghcr.io/${OWNER,,}/libretether-relay" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - uses: docker/setup-buildx-action@v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Image metadata (labels)
        id: meta
        uses: docker/metadata-action@v5.8.0
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          touch "${{ runner.temp }}/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload digest
        uses: actions/upload-artifact@v4.6.2
        with:
          name: digests-${{ strategy.job-index }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-arch digests into a single multi-arch manifest and tag it.
  docker-merge:
    name: Docker image (manifest)
    needs: docker
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve image name (registry needs lowercase)
        run: echo "REGISTRY_IMAGE=ghcr.io/${OWNER,,}/libretether-relay" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Download digests
        uses: actions/download-artifact@v4.3.0
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Image metadata (tags)
        id: meta
        uses: docker/metadata-action@v5.8.0
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag || github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag || github.ref_name }}
            type=raw,value=latest

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${REGISTRY_IMAGE}@sha256:%s " *)

      - name: Inspect
        run: docker buildx imagetools inspect "${REGISTRY_IMAGE}:${{ steps.meta.outputs.version }}"
